<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>銀河艦装ソシャゲ構想</title>
    <style>
      :root {
        --bg: #030814;
        --ink: #f7fbff;
        --muted: #b7c5dc;
        --line: rgba(164, 209, 255, 0.22);
        --panel: rgba(7, 17, 38, 0.78);
        --accent: #7bdcff;
        --gold: #ffe08a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
        background:
          radial-gradient(circle at 12% 8%, rgba(123, 220, 255, 0.24), transparent 28rem),
          radial-gradient(circle at 86% 12%, rgba(126, 97, 255, 0.28), transparent 32rem),
          radial-gradient(circle at 52% 100%, rgba(255, 224, 138, 0.13), transparent 34rem),
          linear-gradient(145deg, #030814 0%, #08152d 48%, #120d2d 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          radial-gradient(circle, rgba(255, 255, 255, 0.36) 1px, transparent 1.5px),
          linear-gradient(rgba(123, 220, 255, 0.055) 1px, transparent 1px);
        background-position: 0 0, 0 0;
        background-size: 58px 58px, 100% 48px;
        mask-image: linear-gradient(180deg, black, transparent 82%);
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1240px, calc(100% - 32px));
        margin: 0 auto;
        padding: 30px 0 72px;
      }

      .back {
        display: inline-flex;
        margin-bottom: 26px;
        color: var(--muted);
        font: 800 13px/1 "Hiragino Sans", "Yu Gothic", sans-serif;
        text-decoration: none;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 440px);
        gap: 28px;
        align-items: end;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 34px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.02)), var(--panel);
        box-shadow: 0 38px 120px rgba(0, 0, 0, 0.42);
      }

      .hero-copy {
        padding: clamp(28px, 5vw, 56px);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font: 900 12px/1 "Hiragino Sans", "Yu Gothic", sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(38px, 7vw, 82px);
        line-height: 0.95;
        letter-spacing: -0.08em;
      }

      .lead {
        max-width: 760px;
        margin: 20px 0 0;
        color: var(--muted);
        font: 600 15px/1.9 "Hiragino Sans", "Yu Gothic", sans-serif;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        margin-top: 20px;
      }

      .chip {
        padding: 8px 11px;
        border: 1px solid color-mix(in srgb, var(--accent), white 18%);
        border-radius: 999px;
        background: color-mix(in srgb, var(--accent), transparent 84%);
        font: 900 12px/1 "Hiragino Sans", "Yu Gothic", sans-serif;
      }

      .hero img {
        width: 100%;
        height: 100%;
        min-height: 360px;
        object-fit: cover;
        border-left: 1px solid var(--line);
        mask-image: linear-gradient(90deg, transparent 0%, black 20%);
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        margin-top: 24px;
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(0, 0, 0, 0.28);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.35);
      }

      .card img {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
      }

      .card figcaption {
        padding: 18px;
      }

      .card strong {
        display: block;
        color: var(--gold);
        font: 900 18px/1.3 "Hiragino Sans", "Yu Gothic", sans-serif;
      }

      .card p {
        margin: 9px 0 0;
        color: var(--muted);
        font: 600 13px/1.75 "Hiragino Sans", "Yu Gothic", sans-serif;
      }

      @media (max-width: 820px) {
        .hero,
        .gallery {
          grid-template-columns: 1fr;
        }

        .hero img {
          min-height: 220px;
          border-top: 1px solid var(--line);
          border-left: 0;
          mask-image: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <a class="back" href="../">← サンプル入口へ戻る</a>

      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">galaxy armada gacha RPG</p>
          <h1>女子高生型宇宙人が、銀河艦隊をまとって戦う。</h1>
          <p class="lead">
            宇宙人が日本の女子高生に変身し、実在する銀河の形をモチーフにした戦艦群を
            外骨格としてまとって戦うソシャゲ構想です。画面ごとに、戦闘・編成・レイド・キャラ詳細の役割を分けています。
          </p>
          <div class="chips">
            <span class="chip">アンドロメダ艦装</span>
            <span class="chip">銀河モチーフ船団</span>
            <span class="chip">変身バトルRPG</span>
          </div>
        </div>
        <img src="./scene-01-andromeda-battle.jpg" alt="アンドロメダ艦装の変身バトル画面">
      </section>

      <section class="gallery" aria-label="銀河艦装ソシャゲ画面案">
        <figure class="card">
          <a href="./scene-01-andromeda-battle.jpg"><img src="./scene-01-andromeda-battle.jpg" alt="アンドロメダ銀河艦装のバトル画面"></a>
          <figcaption><strong>変身バトル</strong><p>M31アンドロメダ銀河を船団化し、少女の外骨格として展開する主戦闘画面。</p></figcaption>
        </figure>
        <figure class="card">
          <a href="./scene-02-fleet-formation.jpg"><img src="./scene-02-fleet-formation.jpg" alt="銀河モチーフ船団の編成画面"></a>
          <figcaption><strong>船団編成</strong><p>天の川、子持ち銀河、ソンブレロ銀河などをユニット属性にしたパーティ編成。</p></figcaption>
        </figure>
        <figure class="card">
          <a href="./scene-03-cluster-raid.jpg"><img src="./scene-03-cluster-raid.jpg" alt="銀河団ドレッドノートのレイド戦"></a>
          <figcaption><strong>銀河団レイド</strong><p>乙女座銀河団を巨大ボスとして扱い、複数プレイヤーの艦装少女が共闘する画面。</p></figcaption>
        </figure>
        <figure class="card">
          <a href="./scene-04-character-detail.jpg"><img src="./scene-04-character-detail.jpg" alt="SSRキャラクター詳細画面"></a>
          <figcaption><strong>キャラ詳細</strong><p>召喚結果・スキル・艦装パーツを一画面で見せる、ソシャゲの所有欲を担う画面。</p></figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
