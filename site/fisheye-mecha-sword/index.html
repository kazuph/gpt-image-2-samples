<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>魚眼機械剣ファンタジー都市</title>
    <style>
      :root {
        --bg: #0b0d14;
        --ink: #f4efe6;
        --muted: #b2ab9f;
        --line: rgba(255, 243, 220, 0.16);
        --panel: rgba(18, 21, 32, 0.8);
        --gold: #dfbf78;
        --steel: #8ca5c7;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
        background:
          radial-gradient(circle at 14% 10%, rgba(223, 191, 120, 0.16), transparent 26rem),
          radial-gradient(circle at 86% 14%, rgba(140, 165, 199, 0.18), transparent 28rem),
          linear-gradient(145deg, #0b0d14 0%, #151b2a 48%, #0b0d14 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: linear-gradient(180deg, black, transparent 86%);
      }

      a { color: inherit; }

      .shell {
        width: min(1240px, calc(100% - 32px));
        margin: 0 auto;
        padding: 30px 0 72px;
      }

      .back {
        display: inline-flex;
        margin-bottom: 24px;
        color: var(--muted);
        font: 800 13px/1 "Hiragino Sans", "Yu Gothic", sans-serif;
        text-decoration: none;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 460px);
        gap: 28px;
        align-items: center;
        padding: clamp(28px, 5vw, 54px);
        border: 1px solid var(--line);
        border-radius: 34px;
        background:
          linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
          var(--panel);
        box-shadow: 0 34px 110px rgba(0,0,0,0.42);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--gold);
        font: 900 12px/1 "Hiragino Sans", "Yu Gothic", sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(38px, 7vw, 82px);
        line-height: 0.94;
        letter-spacing: -0.08em;
      }

      .lead {
        max-width: 760px;
        margin: 18px 0 0;
        color: var(--muted);
        font: 600 15px/1.9 "Hiragino Sans", "Yu Gothic", sans-serif;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }

      .chip {
        padding: 8px 12px;
        border: 1px solid rgba(223, 191, 120, 0.28);
        border-radius: 999px;
        background: rgba(255,255,255,0.05);
        font: 800 12px/1 "Hiragino Sans", "Yu Gothic", sans-serif;
      }

      .hero img {
        display: block;
        width: 100%;
        border-radius: 26px;
        border: 1px solid var(--line);
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        margin-top: 24px;
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(255,255,255,0.04);
        box-shadow: 0 24px 80px rgba(0,0,0,0.34);
      }

      .card img {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
      }

      .card figcaption {
        padding: 16px 16px 18px;
      }

      .card strong {
        display: block;
        color: var(--gold);
        font: 900 18px/1.3 "Hiragino Sans", "Yu Gothic", sans-serif;
      }

      .card span {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font: 600 13px/1.75 "Hiragino Sans", "Yu Gothic", sans-serif;
      }

      @media (max-width: 900px) {
        .hero,
        .gallery {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <a class="back" href="../">← サンプル入口へ戻る</a>

      <section class="hero">
        <div>
          <p class="eyebrow">Fisheye Mecha Sword Fantasy</p>
          <h1>巨大都市を背負うように、巨大機械剣を背負う。</h1>
          <p class="lead">
            魚眼レンズで街そのもののスケールを誇張しつつ、女子キャラクターだけを主役にした中世風ファンタジー都市シリーズです。
            全員が背中に巨大な機械剣を背負い、立つ場所と時間帯だけで世界の厚みを変えています。
          </p>
          <div class="chips">
            <span class="chip">魚眼構図</span>
            <span class="chip">巨大中世都市</span>
            <span class="chip">機械剣の女子</span>
          </div>
        </div>
        <img src="./scene-01-blue-bridge.png" alt="魚眼の巨大ファンタジー都市と機械剣の少女">
      </section>

      <section class="gallery" aria-label="魚眼機械剣ファンタジー都市ギャラリー">
        <figure class="card">
          <a href="./scene-01-blue-bridge.png"><img src="./scene-01-blue-bridge.png" alt="夕暮れの石橋に立つ機械剣の少女"></a>
          <figcaption><strong>蒼の石橋</strong><span>青い夕暮れの高所で、街の層が同心円状に沈んでいく王道の導入。</span></figcaption>
        </figure>
        <figure class="card">
          <a href="./scene-02-red-rooftop.png"><img src="./scene-02-red-rooftop.png" alt="赤髪の少女と朝焼けの都市屋根"></a>
          <figcaption><strong>赤髪の朝焼け</strong><span>市場屋根の上から見下ろす、暖色寄りの起動感が強い一枚。</span></figcaption>
        </figure>
        <figure class="card">
          <a href="./scene-03-silver-plaza.png"><img src="./scene-03-silver-plaza.png" alt="銀髪の少女と夜の円形広場"></a>
          <figcaption><strong>銀髪の夜広場</strong><span>月明かりの広場に立つだけで、都市が静かな天蓋に変わる夜景差分。</span></figcaption>
        </figure>
        <figure class="card">
          <a href="./scene-04-skyport-engineer.png"><img src="./scene-04-skyport-engineer.png" alt="空港区画の工学系剣士の女性"></a>
          <figcaption><strong>空港区画の工学剣士</strong><span>機械剣と都市機構がいちばん自然につながる、技術職寄りのキャラ像。</span></figcaption>
        </figure>
        <figure class="card">
          <a href="./scene-05-library-scholar.png"><img src="./scene-05-library-scholar.png" alt="図書城塞前の学者騎士の女性"></a>
          <figcaption><strong>図書城塞の学者騎士</strong><span>知性と巨大武装の対比を前面に出した、静かな知的ファンタジー寄りの場面。</span></figcaption>
        </figure>
        <figure class="card">
          <a href="./scene-06-rain-lower-city.png"><img src="./scene-06-rain-lower-city.png" alt="雨の下層街に立つ黒髪の女性"></a>
          <figcaption><strong>雨の下層街</strong><span>濡れた石畳と鈍い機械剣で、街の重さと生活感が一番濃く出た締めの一枚。</span></figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
